<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>醫師國考二階 - 歷年分數與及格分析看板</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            color: #333;
            padding: 40px 20px;
        }
        .container {
            max-width: 1450px;
            margin: 0 auto;
        }
        header {
            margin-bottom: 30px;
            text-align: center;
            display: block !important;
        }
        header h1 {
            color: #1e3a8a;
            font-size: 28px;
            margin-bottom: 10px;
        }
        header p {
            color: #64748b;
            font-size: 15px;
        }
        
        /* 工具區塊樣式 */
        .upload-card {
            background: #ffffff;
            border: 2px dashed #3b82f6;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .upload-card:hover {
            border-color: #1d4ed8;
            background-color: #eff6ff;
        }
        
        .btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            cursor: pointer;
        }
        .btn {
            border: 2px solid #3b82f6;
            color: #ffffff;
            background-color: #3b82f6;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        .btn:hover {
            background-color: #1d4ed8;
            border-color: #1d4ed8;
        }
        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }
        
        /* 國考傳送門快捷按鈕 */
        .btn-portal {
            background-color: #10b981;
            border-color: #10b981;
        }
        .btn-portal:hover {
            background-color: #059669;
            border-color: #059669;
        }
        
        .upload-tip {
            margin-top: 5px;
            font-size: 13px;
            color: #64748b;
        }

        .rules-card {
            background: #ffffff;
            border-left: 5px solid #3b82f6;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        .rules-card h3 {
            color: #1e3a8a;
            margin-bottom: 10px;
        }
        .rules-card ul {
            list-style-type: none;
        }
        .rules-card li {
            margin-bottom: 6px;
            font-size: 14px;
            color: #475569;
        }
        .error-message {
            background-color: #fee2e2;
            border-left: 5px solid #ef4444;
            color: #991b1b;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }
        .table-container {
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            display: none;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        
        th {
            background-color: #1e3a8a !important;
            color: #ffffff !important;
            font-weight: 600;
            padding: 16px 10px;
            font-size: 14px;
            text-align: center;
            white-space: nowrap;
        }
        th:first-child {
            text-align: left;
            padding-left: 16px;
        }

            padding: 14px 10px;
