<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>醫師國考二階 - 歷年分數與及格分析看板</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            color: #333;
            padding: 40px 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            margin-bottom: 30px;
            text-align: center;
            display: block !important;
        }
        header h1 {
            color: #1e3a8a;
            font-size: 28px;
            margin-bottom: 10px;
        }
        header p {
            color: #64748b;
            font-size: 15px;
        }
        
        /* 上傳與刷題工具區塊樣式 */
        .upload-card {
            background: #ffffff;
            border: 2px dashed #3b82f6;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .upload-card:hover {
            border-color: #1d4ed8;
            background-color: #eff6ff;
        }
        
        /* 按鈕群組排版 */
        .btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            cursor: pointer;
        }
        .btn {
            border: 2px solid #3b82f6;
            color: #ffffff;
            background-color: #3b82f6;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        .btn:hover {
            background-color: #1d4ed8;
            border-color: #1d4ed8;
        }
        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }
        
        /* 國考刷題專用按鈕樣式 */
        .btn-quiz {
            background-color: #10b981;
            border-color: #10b981;
        }
        .btn-quiz:hover {
            background-color: #059669;
            border-color: #059669;
        }
        
        .upload-tip {
            font-size: 13px;
            color: #64748b;
            margin-top: 5px;
        }

        .rules-card {
            background: #ffffff;
            border-left: 5px solid #3b82f6;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        .rules-card h3 {
            color: #1e3a8a;
            margin-bottom: 10px;
        }
        .rules-card ul {
            list-style-type: none;
        }
        .rules-card li {
            margin-bottom: 6px;
            font-size: 14px;
            color: #475569;
        }
        .error-message {
            background-color: #fee2e2;
            border-left: 5px solid #ef4444;
            color: #991b1b;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }
        .table-container {
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            display: none;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        
        th {
            background-color: #1e3a8a !important;
            color: #ffffff !important;
            font-weight: 600;
            padding: 16px 10px;
            font-size: 14px;
            text-align: center;
            white-space: nowrap;
        }
        th:first-child {
            text-align: left;
            padding-left: 16px;
        }
        
        td {
            padding: 14px 10px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 13.5px;
            text-align: center;
        }
        td:first-child {
            text-align: left;
            padding-left: 16px;
        }
        tr:hover {
            background-color: #f8fafc;
        }
        
        td.sub-col {
            background-color: #f8fafc;
        }
        .sub-score {
            font-size: 11px;
            color: #64748b;
            display: block;
            margin-top: 2px;
        }

        .total-highlight {
            font-weight: 600;
            background-color: #f0fdf4;
        }
        .clinical-highlight {
            font-weight: 500;
            background-color: #eff6ff;
        }

        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 12px;
            text-align: center;
        }
        .badge-success {
            background-color: #d1fae5;
            color: #065f46;
        }
        .badge-fail {
            background-color: #fee2e2;
            color: #991b1b;
        }
        .gap-highlight {
            font-weight: bold;
            color: #ef4444;
            background-color: #fff5f5;
        }
        .gap-score {
            font-size: 11px;
            color: #b91c1c;
            display: block;
            margin-top: 2px;
            font-weight: normal;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>醫師國考歷年分數與及格分析看板</h1>
        <p>上傳您的答題紀錄 JSON 檔案，即時在本地端進行分科數據與落點分析</p>
    </header>

    <div class="upload-card">
        <div class="btn-group">
            <div class="upload-btn-wrapper">
                <button class="btn">選擇並上傳 .json 檔案</button>
                <input type="file" id="file-input" accept=".json" />
            </div>
            <a href="https://simpsonqoo.github.io/medlic_exam_stage2_simulator/" target="_blank" class="btn btn-quiz">
                📝 前往國考二階刷題模擬器 ↗
            </a>
        </div>
        <div class="upload-tip">選取新檔案後表格將自動即
